<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICC Strategy Hub · Team IvoireChess War Room</title>
  <meta name="description" content="Centre de préparation stratégique de Team IvoireChess. Scouting, analyse de répertoires, plan de bataille pour le Team Championship.">
  <meta name="theme-color" content="#050609">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%E2%99%94%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">♔</div>
      <div class="brand-text">
        ICC STRATEGY HUB
        <small>TEAM IVOIRECHESS · WAR ROOM</small>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-view="dashboard">Dashboard</button>
      <button class="tab" data-view="match">Match Center</button>
      <button class="tab" data-view="scout">Scout</button>
      <button class="tab" data-view="roster">Roster</button>
    </nav>

    <div class="topbar-right">
      <button class="icon-btn" title="Effacer le cache" onclick="if(confirm('Vider le cache local (analyses, avatars) ?')){localStorage.clear();location.reload();}">⟳</button>
    </div>
  </header>

  <!-- Vues -->
  <main class="main">
    <div id="view-dashboard" class="view active"></div>
    <div id="view-match" class="view"></div>
    <div id="view-scout" class="view"></div>
    <div id="view-roster" class="view"></div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
